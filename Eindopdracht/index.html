<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseWatch – Dashboard</title>

    <!-- ✔ Juiste paden voor subfolder -->
    <link rel="stylesheet" href="/BloodTracker/Eindopdracht/Css/style.css" />
    <link rel="stylesheet" href="/BloodTracker/Eindopdracht/Css/Theme.css" />
    <link rel="icon" href="/BloodTracker/Eindopdracht/Images/favicon.ico">


    <!-- ✔ Juiste JS paden -->
<script src="/BloodTracker/Eindopdracht/Javascript/translate.js" defer></script>
<script src="/BloodTracker/Eindopdracht/Javascript/instellingen.js" defer></script>
<script src="/BloodTracker/Eindopdracht/Javascript/script.js" defer></script>

  </head>

  <body>
    <header class="app-header">
      <div class="header-left">
        <span class="app-logo">💙</span>
        <h1 class="app-titel">PulseWatch</h1>
      </div>

      <!-- ✔ Navigatie gefixt -->
      <a href="/BloodTracker/Eindopdracht/Pages/Instellingen.html">
        <span class="nav-icon-settings">⚙️</span>
      </a>
    </header>

    <main>

      <!-- MEEST RECENTE METING (3 CARDS) -->
      <section class="cards">
        <div class="card">
          <p id="laatste-sys">--</p>
          <p data-i18n="sys">Systolisch</p>
        </div>

        <div class="card">
          <p id="laatste-dia">--</p>
          <p data-i18n="dia">Diastolisch</p>
        </div>

        <div class="card">
          <p id="laatste-pols">--</p>
          <p data-i18n="pulse">Pols</p>
        </div>
      </section>

      <!-- RECENTE METINGEN -->
      <section>
        <h2 class="sectie-titel" data-i18n="recent_measurements">Recente metingen</h2>
        <div id="recente-lijst"></div>
      </section>

    </main>

    <footer>
      <nav class="Bottom-nav">
        <a href="/BloodTracker/Eindopdracht/index.html" class="active">
          <span class="nav-icon">🏠</span>
          <span class="nav-label" data-i18n="dashboard">Dashboard</span>
        </a>

        <a href="/BloodTracker/Eindopdracht/Pages/Toevoegen.html">
          <span class="nav-icon">➕</span>
          <span class="nav-label" data-i18n="add">Toevoegen</span>
        </a>

        <a href="/BloodTracker/Eindopdracht/Pages/MeetGeschiedenis.html">
          <span class="nav-icon">📊</span>
          <span class="nav-label" data-i18n="history">Geschiedenis </span>
        </a>
      </nav>
    </footer>

    <script>
      const prefs = JSON.parse(localStorage.getItem("pulsewatch_prefs") || "{}");
      if (prefs.donker) {
        document.documentElement.classList.add("dark");
      }

      document.addEventListener("DOMContentLoaded", async () => {
        const prefs = JSON.parse(localStorage.getItem("pulsewatch_prefs") || "{}");

        if (prefs.taal) {
          document.documentElement.lang = prefs.taal;
          await loadLanguage(prefs.taal);
        }

        if (prefs.donker) {
          document.documentElement.classList.add("dark");
        }
      });
    </script>

  </body>
</html>
