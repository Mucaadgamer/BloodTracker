<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="history">Meetgeschiedenis</title>

    <!-- ✔ Juiste paden voor subfolder -->
    <link
      rel="stylesheet"
      href="/BloodTracker/Eindopdracht/Css/Meetgeschiedenis.css"
    />
    <link
      rel="stylesheet"
      href="/BloodTracker/Eindopdracht/Css/Instellingen.css"
    />
    <link rel="stylesheet" href="/BloodTracker/Eindopdracht/Css/Theme.css" />
    <link rel="icon" href="/BloodTracker/Eindopdracht/Images/favicon.ico" />

    <!-- PWA manifest — needed on EVERY page -->
    <link rel="manifest" href="/BloodTracker/Eindopdracht/manifest.json" />

    <!-- Service worker registration — needed on EVERY page -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/BloodTracker/Eindopdracht/sw.js")
          .then((reg) => console.log("SW registered", reg.scope))
          .catch((err) => console.error("SW failed", err));
      }
    </script>

    <!-- ✔ Juiste JS paden -->
    <script
      src="/BloodTracker/Eindopdracht/Javascript/translate.js"
      defer
    ></script>
    <script
      src="/BloodTracker/Eindopdracht/Javascript/instellingen.js"
      defer
    ></script>
    <script
      src="/BloodTracker/Eindopdracht/Javascript/script.js"
      defer
    ></script>
  </head>

  <body>
    <header class="app-header">
      <div class="header-left">
        <span class="app-logo">💙</span>
        <h1 class="app-titel">PulseWatch</h1>
      </div>

      <!-- ✔ Navigatie gefixt -->
      <a href="/BloodTracker/Eindopdracht/Pages/Instellingen.html">
        <span class="nav-icon-settings">⚙️</span>
      </a>
    </header>

    <main class="main-content">
      <!-- FILTER KNOPPEN -->
      <div class="filter-container">
        <button
          class="filter-btn"
          data-filter="vandaag"
          data-i18n="filter_today"
        >
          Vandaag
        </button>
        <button class="filter-btn" data-filter="week" data-i18n="filter_week">
          Deze week
        </button>
        <button class="filter-btn" data-filter="maand" data-i18n="filter_month">
          Deze maand
        </button>
        <button
          class="filter-btn active"
          data-filter="alles"
          data-i18n="filter_all"
        >
          Alles
        </button>
      </div>

      <!-- GESCHIEDENIS LIJST -->
      <div id="geschiedenis-lijst">
        <p class="leeg-tekst" data-i18n="no_measurements">Nog geen metingen.</p>
      </div>

      <!-- PAGINATIE -->
      <div id="paginatie" class="paginatie"></div>
    </main>

    <footer>
      <nav class="Bottom-nav">
        <a href="/BloodTracker/Eindopdracht/index.html">
          <span class="nav-icon">🏠</span>
          <span class="nav-label" data-i18n="dashboard">Dashboard</span>
        </a>

        <a href="/BloodTracker/Eindopdracht/Pages/Toevoegen.html">
          <span class="nav-icon">➕</span>
          <span class="nav-label" data-i18n="add">Toevoegen</span>
        </a>

        <a
          href="/BloodTracker/Eindopdracht/Pages/MeetGeschiedenis.html"
          class="active"
        >
          <span class="nav-icon">📊</span>
          <span class="nav-label" data-i18n="history">Geschiedenis</span>
        </a>
      </nav>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const prefs = JSON.parse(
          localStorage.getItem("pulsewatch_prefs") || "{}",
        );

        document.documentElement.setAttribute(
          "data-theme",
          prefs.donker ? "dark" : "light",
        );

        if (prefs.taal) {
          document.documentElement.lang = prefs.taal;
          await loadLanguage(prefs.taal);
        }
      });

      const prefs = JSON.parse(
        localStorage.getItem("pulsewatch_prefs") || "{}",
      );
      if (prefs.donker) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </body>
</html>
